<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --green: #2d6a4f;
  --green-light: #52b788;
  --green-pale: #d8f3dc;
  --bg: #fafaf8;
  --surface: #ffffff;
  --border: #e8e5df;
  --text: #1a1a18;
  --muted: #6b6b67;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.box { width: 100%; max-width: 320px; text-align: center; }
.leaf { font-size: 48px; margin-bottom: 16px; }
h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--green); margin-bottom: 6px; }
p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); outline: none; margin-bottom: 10px; transition: border-color 0.2s; }
input:focus { border-color: var(--green-light); }
button { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
button:active { opacity: 0.85; }
.error { font-size: 13px; color: #e05252; margin: 8px 0; min-height: 18px; }
.msg { font-size: 13px; color: var(--green); margin: 8px 0; min-height: 18px; }
</style>
</head>
<body>
<div class="box">
  <div class="leaf">🌿</div>
  <h1>Nova senha</h1>
  <p>Digite sua nova senha abaixo</p>
  <input type="password" id="nova-senha" placeholder="Nova senha" />
  <input type="password" id="nova-senha2" placeholder="Confirmar nova senha" onkeydown="if(event.key==='Enter') salvar()" />
  <div class="error" id="erro"></div>
  <div class="msg" id="msg"></div>
  <button onclick="salvar()">Salvar nova senha</button>
</div>

<script>
var SUPABASE_URL = 'https://crvcqvqyxunfvsgdcqld.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNydmNxdnF5eHVuZnZzZ2RjcWxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTQ1MjYsImV4cCI6MjA4OTk3MDUyNn0.bYR4VvMYQuXJ00e2wE7QdRhGUF6KfffZlWBFI3u8QZ8';

// Lê o token do hash
var hash = window.location.hash.substring(1);
var params = {};
hash.split('&').forEach(function(p) {
  var kv = p.split('=');
  if(kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
});

var token = params['access_token'];

if(!token) {
  document.getElementById('erro').textContent = 'Link inválido ou expirado. Solicite um novo.';
  document.querySelector('button').disabled = true;
}

async function salvar() {
  var nova = document.getElementById('nova-senha').value;
  var nova2 = document.getElementById('nova-senha2').value;
  document.getElementById('erro').textContent = '';
  document.getElementById('msg').textContent = '';
  if(!nova || nova.length < 6) { document.getElementById('erro').textContent = 'Senha deve ter pelo menos 6 caracteres.'; return; }
  if(nova !== nova2) { document.getElementById('erro').textContent = 'As senhas não coincidem.'; return; }
  try {
    // Troca o token de verificação por um JWT
    var verify = await fetch(SUPABASE_URL + '/auth/v1/verify', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, type: 'recovery' })
    });
    var verifyData = await verify.json();
    if(!verifyData.access_token) {
      document.getElementById('erro').textContent = 'Link inválido ou expirado. Solicite um novo.';
      return;
    }
    // Atualiza a senha com o JWT
    var res = await fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + verifyData.access_token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ password: nova })
    });
    var data = await res.json();
    if(data.id) {
      document.getElementById('msg').textContent = 'Senha redefinida! Redirecionando...';
      setTimeout(function(){ window.location.href = '/plano-alimentar/'; }, 2000);
    } else {
      document.getElementById('erro').textContent = 'Erro ao salvar senha.';
    }
  } catch(e) {
    document.getElementById('erro').textContent = 'Erro de conexão.';
  }
}
</script>
</body>
</html>
