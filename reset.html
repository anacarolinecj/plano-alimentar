<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando…</title>
<style>
body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fafaf8; color: #1a1a18; }
.box { text-align: center; padding: 24px; }
p { margin: 8px 0; color: #6b6b67; }
</style>
</head>
<body>
  <div class="box">
    <h1>Redirecionando…</h1>
    <p>Estamos abrindo a tela principal para redefinir sua senha.</p>
  </div>
<script>
  (function () {
    var base = window.location.pathname.replace(/reset\.html$/, '');
    var dest = base + (window.location.hash || '');
    window.location.replace(dest);
  })();
</script>
</body>
</html>
